# session persistence (office policy)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
run '~/.tmux/plugins/tpm/tpm'

set -g base-index 1
setw -g pane-base-index 1
set -g mode-keys vi

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

set -g mouse off
set -g focus-events on

# Minimal status bar — craftsman-dark muted palette
set -g status-interval 5
set -g status-style "bg=#1c1f26,fg=#c5cad4"
set -g status-left " #S "
set -g status-left-style "bg=#3d4250,fg=#c5cad4"
set -g status-right " %H:%M "
set -g status-right-style "bg=#1c1f26,fg=#606672"
set -g window-status-format " #I:#W "
set -g window-status-style "bg=#1c1f26,fg=#606672"
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=#2a2e38,fg=#a1c4a3"
set -g window-status-separator ""

# Muted pane borders
set -g pane-border-style "fg=#2a2e38"
set -g pane-active-border-style "fg=#3d4250"

bind r source-file ~/.tmux.conf \; display "reloaded"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
